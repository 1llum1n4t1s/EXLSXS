<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>EXLSXS Finisher</title>
    <!-- Office UI Fabric Core -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>
    <!-- Office.js -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { padding: 10px; font-family: 'Segoe UI', sans-serif; }
        .ms-Dropdown { margin-bottom: 10px; }
        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        select, input[type="text"] { width: 100%; padding: 5px; box-sizing: border-box; }
        .button-primary { 
            background-color: #0078d4; color: white; border: none; padding: 10px 20px; 
            cursor: pointer; font-size: 14px; width: 100%;
        }
        .button-primary:hover { background-color: #106ebe; }
        .checkbox-container { display: flex; align-items: center; margin-bottom: 10px; }
        .checkbox-container input { margin-right: 10px; }
    </style>
</head>
<body class="ms-Fabric">
    <div class="section">
        <h3>仕上げ設定</h3>
        
        <div class="checkbox-container">
            <input type="checkbox" id="adjustFontCheck" />
            <label for="adjustFontCheck" style="margin-bottom:0">フォントを揃える</label>
        </div>

        <div id="fontSection" style="display:block;">
            <label>フォント</label>
            <select id="fontSelect">
                <option>Loading...</option>
            </select>
        </div>

        <label>倍率</label>
        <select id="zoomSelect">
            <option value="100">100%</option>
            <option value="80">80%</option>
            <option value="85">85%</option>
            <option value="90">90%</option>
            <option value="50">50%</option>
            <option value="75">75%</option>
            <option value="125">125%</option>
            <option value="150">150%</option>
            <option value="200">200%</option>
        </select>

        <label>表示モード</label>
        <select id="viewSelect">
            <option value="Normal">標準</option>
            <option value="PageLayout">ページレイアウト</option>
            <option value="PageBreakPreview">改ページプレビュー</option>
        </select>
    </div>

    <div class="section">
        <button id="runButton" class="button-primary">仕上げ実行</button>
    </div>
    
    <div id="status" style="margin-top: 10px; color: green;"></div>

    <script src="task-pane.js"></script>
</body>
</html>
