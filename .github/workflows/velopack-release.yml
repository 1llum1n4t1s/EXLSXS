name: Velopack Release

on:
  push:
    branches:
      - "release/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Velopack release
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build Velopack package
        shell: pwsh
        env:
          EXLSXS_VSTO_SIGNING_PFX_BASE64: ${{ secrets.EXLSXS_VSTO_SIGNING_PFX_BASE64 }}
          EXLSXS_VSTO_SIGNING_PFX_PASSWORD: ${{ secrets.EXLSXS_VSTO_SIGNING_PFX_PASSWORD }}
          EXLSXS_VSTO_SIGNING_THUMBPRINT: ${{ secrets.EXLSXS_VSTO_SIGNING_THUMBPRINT }}
          EXLSXS_VELOPACK_SIGN_PARAMS: ${{ secrets.EXLSXS_VELOPACK_SIGN_PARAMS }}
          EXLSXS_VELOPACK_AZURE_TRUSTED_SIGN_FILE: ${{ secrets.EXLSXS_VELOPACK_AZURE_TRUSTED_SIGN_FILE }}
          EXLSXS_EXPECTED_PUBLISHER_THUMBPRINT: ${{ secrets.EXLSXS_EXPECTED_PUBLISHER_THUMBPRINT }}
          EXLSXS_EXPECTED_PUBLISHER_SUBJECT: ${{ secrets.EXLSXS_EXPECTED_PUBLISHER_SUBJECT }}
        run: |
          .\build\pack-velopack.ps1 `
            -Channel win `
            -UpdateSource "https://github.com/${{ github.repository }}" `
            -UpdateSourceKind Github `
            -RequireVelopackSigning

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exlsxs-velopack-win
          path: artifacts/velopack-releases/*

  publish:
    name: Publish GitHub release
    runs-on: windows-latest
    needs: build
    environment: release
    permissions:
      contents: write

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Download workflow artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: exlsxs-velopack-win
          path: artifacts/velopack-releases

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version 0.0.1369-g1d5c984
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repoUrl = "https://github.com/${{ github.repository }}"
          vpk upload github `
            --repoUrl $repoUrl `
            --token "$env:GH_TOKEN" `
            --outputDir artifacts\velopack-releases `
            --channel win `
            --publish `
            --releaseName "EXLSXS"
